{% extends "base.html" %}
{% block title %}Mark Attendance{% endblock %}
{% block content %}
<h2>Mark Attendance for {{ student.name }} ({{ student.roll }})</h2>
<form method="POST">
    <label>Status:</label>
    <select name="status">
        <option value="Present">Present</option>
        <option value="Absent">Absent</option>
    </select><br>
    <button type="submit">Submit Attendance</button>
</form>
{% endblock %}
